name: Flutter CI/CD

permissions:
  contents: write
  actions: read
  packages: read

on:
  push:
    branches: [ "master"]
    tags: ["v*"]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      bump_major:
        description: 'Bump major version'
        required: false
        type: boolean
        default: false

env:
  # APP_VERSION: "1.0.${{ github.event.pull_request.number || github.run_number }}"
  BASE_VERSION_FILE: "pubspec.yaml"

jobs:
  # ---------------------------------------------------------
  # Job 1: Analyze & Test
  # ---------------------------------------------------------
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get

  # ---------------------------------------------------------
  # Job 2: Analyze & Test
  # ---------------------------------------------------------
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      full_version: ${{ steps.calc.outputs.full_version }}
      version_tag: ${{ steps.calc.outputs.version_tag }}
      is_manual_tag: ${{ steps.calc.outputs.is_mamual_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Version
        id: calc
        run: |
          # Check if this is a manual tag release
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "full_version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "version_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_manual_tag=true >> $GITHUB_OUTPUT
            echo "Manual tag release: $"{{ github.ref_name }}"
            exit 0
          fi
          
          # Read base version from pubspec.yaml (e.g., "1.0.0")
          BASE=$(grep "^version:" ${{ env.BASE_VERSION_FILE }} | head -1 | cut -d' ' -f2 | cut -d'+' -f1 | cut -d'-' -f1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          
          # Count total commits (for PATCH number)
          TOTAL_COMMITS=$(git rev-list --count HEAD)
          
          # Determine version bump logic
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: Keep version same as base (will update on merge)
            NEW_MAJOR=$MAJOR
            NEW_MINOR=$MINOR
            NEW_PATCH=$TOTAL_COMMITS
            echo "📋 PR build (version unchanged until merge)"
          
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger
            if [[ "${{ github.event.inputs.bump_major }}" == "true" ]]; then
              NEW_MAJOR=$((MAJOR + 1))
              NEW_MINOR=0
              NEW_PATCH=$TOTAL_COMMITS
            else
              NEW_MAJOR=$MAJOR
              NEW_MINOR=$((MINOR + 1))
              NEW_PATCH=$TOTAL_COMMITS
            fi
            echo "🚀 Manual trigger release"
          
          else
            # Push to master: Bump MINOR, PATCH = commit count
            NEW_MAJOR=$MAJOR
            NEW_MINOR=$((MINOR + 1))
            NEW_PATCH=$TOTAL_COMMITS
            echo "🔀 Master push: Minor bump"
          fi
          
          FULL_VERSION="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          VERSION_TAG="v${FULL_VERSION}"
          
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "is_manual_tag=false" >> $GITHUB_OUTPUT
          
          echo "✨ Version: $VERSION_TAG"
          echo "   Commits: $TOTAL_COMMITS"
          echo "   Base: $BASE → New: $FULL_VERSION"


  # ---------------------------------------------------------
  # Job 3: Build Windows
  # ---------------------------------------------------------
  build-windows:
    needs: [calculate-version, analyze-and-test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
      
      - name: Install Dependencies
        run: flutter pub get

      # --- Dynamic Versioning (PowerShell) ---
      - name: Update Pubspec Version
        shell: pwsh
        run: |
          $VERSION = "${{ needs.calculate-version.outputs.full_version }}"
          $content = Get-Content pubspec.yaml
          $content = $content -replace '^version: .*', "version: $VERSION"
          $content | Set-Content pubspec.yaml
          Write-Host "✅ Version: $VERSION"

      - name: Decode Firebase Options
        shell: pwsh
        run: |
          $content = "${{ secrets.FIREBASE_OPTIONS_BASE64 }}"
          $bytes = [Convert]::FromBase64String($content)
          [IO.File]::WriteAllBytes("lib/firebase_options.dart", $bytes)
          Write-Host "Firebase options decoded successfully"

      - name: Build Windows Exe
        run: flutter build windows --release

      - name: Verify Build Output
        shell: pwsh
        id: verify_build
        run: |
          $buildPath = "build/windows/x64/runner/Release"
          if (Test-Path $buildPath) {
            Write-Host "Found build path: $buildPath"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "build_path=$buildPath"
          }

      - name: Create Versioned Zip
        shell: pwsh
        if: success()
        run: |
          $VERSION = "${{ needs.calculate-version.outputs.full_version }}"
          $zipName = "InvestFlow-windows-v$VERSION.zip"
          $buildPath = "${{ steps.verify_build.outputs.build_path }}"
          
          Compress-Archive -Path "$buildPath\*" -DestinationPath $zipName -Force
          Write-Host "✅ Created: $zipName"

          # Verify zip was created
          if (Test-Path $zipName) {
            $size = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
            Write-Host "Zip file: $zipName ($size MB)"
          }
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        if : success()
        with:
          name: windows-exe-v${{ needs.calculate-version.outputs.full_version }}
          path: InvestFlow-windows-v${{ needs.calculate-version.outputs.full_version }}.zip
          retention-days: 5

  # ---------------------------------------------------------
  # Job 4: Publish Release
  # ---------------------------------------------------------
  release:
    needs: [calculate-version, build-windows]
    runs-on: ubuntu-latest
    if: always() && needs.calculate-version.outputs.is_manual_tag != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Zip
        uses: actions/download-artifact@v4
        if: ${{ needs.build-windows.result == 'success' }}
        with:
          name: windows-exe-v${{ needs.calculate-version.outputs.full_version }}
          path: ./release-assets
      
      - name: Determine Release Type
        id: release_type
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "is_draft=true" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.calculate-version.outputs.full_version }}
          name: Release v${{ needs.calculate-version.outputs.full_version }}
          draft: ${{ steps.release_type.outputs.is_draft }}
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          files: ./release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
