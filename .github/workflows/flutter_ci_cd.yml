name: Flutter CI/CD

on:
  push:
    branches: [ "main", "master", "dev-backend" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # Linear Versioning Logic:
  # If PR: Use PR Number (e.g., 1.0.45)
  # If Push: Use Run Number (e.g., 1.0.102)
  APP_VERSION: "1.0.${{ github.event.pull_request.number || github.run_number }}"

jobs:
  # ---------------------------------------------------------
  # Job 1: Analyze & Test
  # ---------------------------------------------------------
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: flutter pub get
      

  # ---------------------------------------------------------
  # Job 2: Build Windows (Priority)
  # ---------------------------------------------------------
  build-windows:
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
      
      - name: Install Dependencies
        run: flutter pub get

      # --- Dynamic Versioning (PowerShell) ---
      - name: Update Pubspec Version
        shell: pwsh
        run: |
          $version = "${{ env.APP_VERSION }}"
          (Get-Content pubspec.yaml) -replace 'version: .*', "version: $version" | Set-Content pubspec.yaml
          Write-Host "Version set to $version"

      - name: Decode Firebase Options
        shell: pwsh
        run: |
          $content = "${{ secrets.FIREBASE_OPTIONS_BASE64 }}"
          $bytes = [Convert]::FromBase64String($content)
          [IO.File]::WriteAllBytes("lib/firebase_options.dart", $bytes)
          Write-Host "Firebase options decoded successfully"

      - name: Build Windows Exe
        run: flutter build windows --release

      - name: Verify Build Output
        run: |
          Write-Host "==Checking build directory structure=="
          if (Test-Path "build/windows") {
            Get-ChildItem "build/windows" -Recurse -Directory | Select-Object FullName
          }
          Write-Host "== Looking for Release folder =="
          $releasePaths = @(
            "build/windows/runner/Release",
            "build/windows/x64/Release",
            "build/windows/runner/Release/runner",
            "build/windows/flutter/Release",
            "build/windows/x64/runner/Release"
          )
          foreach ($path in $releasePaths) {
            if (Test-Path $path) {
              Write-Host "Found potential release directory: $path"
              Get-ChildItem -Path $path | Select-Object FullName
            } else {
              Write-Host "Directory not found: $path"
            }
          }
      
      - name: Find Windows Build Output
        id: find_output
        shell: pwsh
        run: |
          $potentialPaths = @(
            "build/windows/runner/Release",
            "build/windows/x64/Release",
            "build/windows/runner/Release/runner",
            "build/windows/flutter/Release",
            "build/windows/x64/runner/Release"
          )
          $foundPath = ""
          foreach ($path in $potentialPaths) {
            if (Test-Path $path) {
              # --- Write-Host "Found build output at: $path"
              # --- Write-Host "::set-output name=output_path::$path"
              $foundPath = $path
              break
            }
          }
          if ($foundPath -eq "") {
            $exeFile = Get-ChildItem -Path "build" -Filter "*.exe" -Recurse | Select-Object -First 1
            if ($exeFile) {
              $foundPath = $exeFile.DirectoryName}
          }
          Write-Host "Build output path: $foundPath"
          echo " build_path=$foundPath" >> $GITHUB_OUTPUT

      - name: Create Versioned Zip
        shell: pwsh
        if: ${{ steps.find_output.outputs.build_path != '' }}
        run: |
          $version = "${{ env.APP_VERSION }}"
          $zipName = "flutter-windows-v$version.zip"
          $buildPath = "${{ steps.find_output.outputs.build_path }}"

          Write-Host "Zipping from: $buildPath"
          Compress-Archive -Path "$buildPath\*" -DestinationPath $zipName -Force
          Write-Host "Created $zipName"

          # Verify zip was created
          if (Test-Path $zipName) {
            $size = (Get-Item $zipName).Length / 1MB
            Write-Host "Zip file size: $([math]::Round($size, 2)) MB"
          }
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        if : ${{ steps.find_output.outputs.build_path != '' }}
        with:
          name: windows-exe-v${{ env.APP_VERSION }}
          path: flutter-windows-v${{ env.APP_VERSION }}.zip

  # ---------------------------------------------------------
  # Job 3: Publish Release
  # ---------------------------------------------------------
  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    # Run on master pushes or manual dispatch. 
    # For PRs, we create a Draft. For Master, we create a Public Release.
    if: always() && needs.build-windows.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Zip
        uses: actions/download-artifact@v4
        if: ${{ needs.build-windows.result == 'success' }}
        with:
          name: windows-exe-v${{ env.APP_VERSION }}
          path: ./release-assets
      
      - name: Determine Release Type
        id: release_type
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "is_draft=true" >> $GITHUB_OUTPUT
            echo "tag_name=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "is_draft=false" >> $GITHUB_OUTPUT
            echo "tag_name=v${{ env.APP_VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_type.outputs.tag_name }}
          name: Release ${{ env.APP_VERSION }} (${{ github.event_name == 'pull_request' && 'PR' || 'Master' }})
          draft: ${{ steps.release_type.outputs.is_draft }}
          prerelease: ${{ github.event_name == 'pull_request' }}
          files: ./release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
